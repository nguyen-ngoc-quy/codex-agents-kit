<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex CLI Ultimate — Admin UI</title>
  <link rel="stylesheet" href="css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 class="logo">
        <span class="logo-icon">⌘</span>
        <span class="logo-text">Codex<span class="logo-highlight">UI</span></span>
      </h1>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <a href="#/" class="nav-item active" data-page="dashboard">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="#/profiles" class="nav-item" data-page="profiles">
        <span class="nav-icon">⚙️</span> Profiles
      </a>
      <a href="#/mcp" class="nav-item" data-page="mcp">
        <span class="nav-icon">🔌</span> MCP Servers
      </a>
      <a href="#/diagnostics" class="nav-item" data-page="diagnostics">
        <span class="nav-icon">🔍</span> Diagnostics
      </a>
      <a href="#/benchmark" class="nav-item" data-page="benchmark">
        <span class="nav-icon">⚡</span> Benchmark
      </a>
      <a href="#/agents" class="nav-item" data-page="agents">
        <span class="nav-icon">🤖</span> Agents
      </a>
      <a href="#/settings" class="nav-item" data-page="settings">
        <span class="nav-icon">🎨</span> Settings
      </a>
      <a href="#/openrouter" class="nav-item" data-page="openrouter">
        <span class="nav-icon">🌐</span> OpenRouter Models
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="version-badge">v0.1.0</div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
        <span id="theme-icon">🌙</span>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content" id="main-content">
    <header class="top-bar" id="top-bar">
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">☰</button>
      <h2 class="page-title" id="page-title">Dashboard</h2>
      <div class="top-bar-actions">
        <div class="connection-status" id="connection-status">
          <span class="status-dot status-dot--green"></span>
          <span class="status-text">Connected</span>
        </div>
      </div>
    </header>
    <div class="content-area" id="content-area">
      <div class="loading-spinner" id="loading-spinner">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>
    </div>
  </main>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title"></h3>
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/components/status-badge.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/header.js"></script>
  <script src="js/components/sidebar.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/profiles.js"></script>
  <script src="js/pages/mcp.js"></script>
  <script src="js/pages/diagnostics.js"></script>
  <script src="js/pages/benchmark.js"></script>
  <script src="js/pages/agents.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/pages/openrouter.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
