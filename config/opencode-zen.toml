# Codex Profile: opencode-zen
# Uses OpenCode Zen API — curated models for coding agents
# Website: https://opencode.ai/zen
# Base URL: https://opencode.ai/zen/v1
# recommended_agent: debugger

model_provider = "openai"
model = "deepseek-v4-flash-free"

[model_providers.openai]
name = "OpenCode Zen"
base_url = "https://opencode.ai/zen/v1"
env_key = "OPENCODE_API_KEY"

[tools]
web_search = true
file_browser = true

[windows]
sandbox = "unelevated"

[plugins."test-android-apps@openai-curated"]
enabled = true

[plugins."visualize@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

# ── MCP Servers ──────────────────────────────────────────────────
# These are activated by install.ps1 / install.sh at setup time.
# The __WORKSPACE_ROOT__ placeholder is replaced with your project path.

[mcp_servers.filesystem]
command = "cmd"
args = ["/c", "npx", "-y", "@modelcontextprotocol/server-filesystem", "__WORKSPACE_ROOT__"]

[mcp_servers.git]
command = "uvx"
args = ["mcp-server-git", "--repository", "__WORKSPACE_ROOT__"]

[mcp_servers.github]
command = "cmd"
args = ["/c", "npx", "-y", "@modelcontextprotocol/server-github"]
# Lưu ý: package này đã bị deprecated, xem ghi chú bên dưới
# Set your GitHub token via env var, then uncomment:
# [mcp_servers.github.env]
# GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_PERSONAL_ACCESS_TOKEN}"

[mcp_servers.playwright]
command = "cmd"
args = ["/c", "npx", "-y", "@playwright/mcp@latest"]

[mcp_servers.context7]
command = "cmd"
args = ["/c", "npx", "-y", "@upstash/context7-mcp"]
