# Codex Profile: premium
# Uses OpenRouter Premium API (or direct OpenAI/Anthropic)

model_provider = "openrouter"
model = "anthropic/claude-3.5-sonnet" # Standard coding benchmark

[model_providers.openrouter]
name = "OpenRouter AI (Premium)"
base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_API_KEY"

[model_providers.openrouter.query_params]
models = [
  "anthropic/claude-3.5-sonnet",
  "openai/gpt-4o",
  "google/gemini-1.5-pro"
]
route = "fallback"

# Direct OpenAI configuration option (uncomment to use directly)
# model_provider = "openai"
# model = "gpt-4o"
# [model_providers.openai]
# name = "OpenAI"
# base_url = "https://api.openai.com/v1"
# env_key = "OPENAI_API_KEY"

# Direct Anthropic configuration option (uncomment to use directly)
# model_provider = "anthropic"
# model = "claude-3-5-sonnet-20241022"
# [model_providers.anthropic]
# name = "Anthropic"
# base_url = "https://api.anthropic.com/v1"
# env_key = "ANTHROPIC_API_KEY"

[tools]
web_search = true
file_browser = true

[windows]
sandbox = "unelevated"

[plugins."test-android-apps@openai-curated"]
enabled = true

[plugins."visualize@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

# ── MCP Servers ──────────────────────────────────────────────────
# These are activated by install.ps1 / install.sh at setup time.
# The __WORKSPACE_ROOT__ placeholder is replaced with your project path.

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "__WORKSPACE_ROOT__"]

[mcp_servers.git]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-git"]

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
# Set your GitHub token via env var, then uncomment:
# [mcp_servers.github.env]
# GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_PERSONAL_ACCESS_TOKEN}"

[mcp_servers.docker]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-docker"]

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-playwright"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@context7/mcp-server"]
