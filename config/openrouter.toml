# OpenRouter Configuration for Codex CLI
# recommended_agent: debugger
model_provider = "openrouter"
model = "google/gemini-2.5-flash:free" # Default fallback-friendly model

[model_providers.openrouter]
name = "OpenRouter AI"
base_url = "https://openrouter.ai/api/v1"
# API Key is read from environment variable OPENROUTER_API_KEY.
# Set it via: $env:OPENROUTER_API_KEY = "sk-or-v1-..." (Windows)
#         or: export OPENROUTER_API_KEY="sk-or-v1-..." (Linux/macOS)
env_key = "OPENROUTER_API_KEY"
[model_providers.openrouter.query_params]
models = [
  "cohere/north-mini-code:free",
  "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free",
  "nvidia/nemotron-3-ultra-550b-a55b:free",
  "google/lyria-3-pro-preview",
  "nvidia/nemotron-3-super-120b-a12b:free",
  "google/lyria-3-clip-preview",
  "google/gemma-4-31b-it:free",
  "google/gemma-4-26b-a4b-it:free",
  "poolside/laguna-xs-2.1:free",
  "tencent/hy3:free"
]
route = "fallback"

[tools]
web_search = true
file_browser = true

[windows]
sandbox = "unelevated"

[plugins."test-android-apps@openai-curated"]
enabled = true

[plugins."visualize@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

# ── MCP Servers ──────────────────────────────────────────────────
# These are activated by install.ps1 / install.sh at setup time.
# The __WORKSPACE_ROOT__ placeholder is replaced with your project path.

[mcp_servers.filesystem]
command = "cmd"
args = ["/c", "npx", "-y", "@modelcontextprotocol/server-filesystem", "__WORKSPACE_ROOT__"]

[mcp_servers.git]
command = "uvx"
args = ["mcp-server-git", "--repository", "__WORKSPACE_ROOT__"]

[mcp_servers.github]
command = "cmd"
args = ["/c", "npx", "-y", "@modelcontextprotocol/server-github"]
# Lưu ý: package này đã bị deprecated, xem ghi chú bên dưới
# Set your GitHub token via env var, then uncomment:
# [mcp_servers.github.env]
# GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_PERSONAL_ACCESS_TOKEN}"

[mcp_servers.playwright]
command = "cmd"
args = ["/c", "npx", "-y", "@playwright/mcp@latest"]

[mcp_servers.context7]
command = "cmd"
args = ["/c", "npx", "-y", "@upstash/context7-mcp"]
